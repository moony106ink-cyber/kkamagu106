        <style>

        </style>
        <style>

        var iframe = document.getElementById("cipher")
        var iframe_document = iframe.contentWindow.document;
        var org = document.getElementById("org");

    function base64ToBlob(base64, mimetype) {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; ++i) {
            bytes[i] = binaryString.charCodeAt(i);
        }

        return new Blob([bytes], { type: mimetype });
    }

    function downloadURI(content, filenameWithContentType) {
        let filename = filenameWithContentType.split("#")[0]
        let mimetype = filenameWithContentType.split("#")[1]
        let uriContent = URL.createObjectURL(base64ToBlob(content, mimetype));
        let link = document.createElement('a');
        link.setAttribute('href', uriContent);
        link.setAttribute('download', filename);
        let event = new MouseEvent('click');
        link.dispatchEvent(event);
    }

    function decryptAndReplaceHtml(passphrase) {
        var result = decode(encryptedMsg, passphrase);
        if (!result.success) {
            return false;
        }
        var plainHTML = result.decoded;

        viewIframeContent(plainHTML);
        return true;
    }

    function decryptAndReplcaeAttachment(passphrase) {
        for (let i = 0; i < fc.length; i++) {
            var result = decodeAttachment(fc[i], passphrase);
            if (!result.success) {
                return false;
            }
                fc[i] = result.decoded;
            }
        return true;
    }

    function makeAttachmentTag() {
        var attachmentTagHtml = "";
        for (var i = 0; i < fn.length; i++) {
            attachmentTagHtml += '<a href="javascript:' + 'downloadURI(fc[' + i + '], fn[' + i + ']);"> ' + fn[i].split("#")[0]+ '</a><br>'
        }

        if (attachmentTagHtml !== "") {
            var attachmentBox = document.getElementById('af');
            attachmentBox.innerHTML = attachmentTagHtml;
        }
    }

    window.onload = function () {
